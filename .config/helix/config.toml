theme = "catppuccin_mocha"

[editor]
line-number = "relative"
middle-click-paste = false
cursorline = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[keys.normal]
g = { a = "code_action" }

[keys.insert]
j = { j = "normal_mode" }
